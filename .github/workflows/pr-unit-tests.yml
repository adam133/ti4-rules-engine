name: PR Unit Tests

on:
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Analyze pbd22635 and run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Analyze game pbd22635
        run: ti4-analyze "pbd22635"

      - name: Run unit tests
        run: python -m pytest tests
